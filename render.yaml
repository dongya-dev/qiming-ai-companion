services:
  - type: web
    name: qiming-ai-companion
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_BASE_TOKEN
        sync: false
      - key: DOUBAO_APP_ID
        sync: false
      - key: DOUBAO_ACCESS_KEY
        sync: false
